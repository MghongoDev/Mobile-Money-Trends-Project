name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    - name: Run tests
      run: |
        pytest
    - name: Run linting
      run: |
        pip install flake8
        flake8 mobile_money_project --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 mobile_money_project --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics